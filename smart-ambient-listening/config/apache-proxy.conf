# Add these lines inside your <VirtualHost *:443> block in default-ssl.conf
# Exclude the SMART app static files from proxy
ProxyPass /app/ !

# API proxies for SMART Ambient Scribe
ProxyTimeout 600

# Transcription service (port 8001)
ProxyPass /transcription/ http://127.0.0.1:8001/ retry=0 connectiontimeout=5 timeout=600
ProxyPassReverse /transcription/ http://127.0.0.1:8001/

# Summarization service (port 8002)
ProxyPass /api/summarize http://127.0.0.1:8002
ProxyPassReverse /api/summarize http://127.0.0.1:8002

# OpenEMR proxy (MUST be LAST)
ProxyPass / http://127.0.0.1:8080/
ProxyPassReverse / http://127.0.0.1:8080/
