<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launching SMARTClaims...</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="launch-container">
    <div class="launch-content">
        <div class="spinner large"></div>
        <h2>Connecting to OpenEMR...</h2>
        <p>Please wait while we authorize your session.</p>
    </div>
</div>

<script>
    window.SMART_CONFIG = {
        clientId: 'smartclaims-automated-coding',
        scope: 'launch patient/Patient.read patient/Encounter.read patient/DocumentReference.read patient/Condition.read patient/Procedure.read patient/Observation.read patient/Binary.read openid fhirUser api:oemr user/document.read user/document.write user/custom.read user/custom.write',
        redirectUri: window.location.origin + '/app/index.html'
    };
</script>

<script src="js/fhirclient.min.js"></script>
<script>
    FHIR.oauth2.authorize({
        clientId: window.SMART_CONFIG.clientId,
        scope: window.SMART_CONFIG.scope,
        redirectUri: window.SMART_CONFIG.redirectUri,
        completeInTarget: true
    }).catch(error => {
        console.error('Authorization error:', error);
        document.querySelector('.launch-content').innerHTML = `
            <h2>Launch Failed</h2>
            <p class="error">${error.message}</p>
            <p>Please close this window and try again from OpenEMR.</p>
        `;
    });
</script>
</body>
</html>
